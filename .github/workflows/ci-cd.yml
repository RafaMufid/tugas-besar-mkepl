name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  continuous-testing:
    name: Continuous Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test

      - name: Generate JaCoCo Coverage
        run: mvn jacoco:report

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

          
  continuous-inspection:
    name: Continuous Inspection
    runs-on: ubuntu-latest
    needs: continuous-testing
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=RafaMufid_Tugas-Besar-MKEPL 
          -Dsonar.organization=rafamufid 
          -Dsonar.host.url=https://sonarcloud.io       

  continuous-deployment:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: continuous-inspection
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Package (JAR)
        run: mvn -B package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foodfrenzy-jar
          path: target/*.jar
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: "FoodFrenzy v1.0.1"
          body: |
            ## FoodFrenzy Release v1.0.0

            Automated release dari CI/CD Pipeline.

            ### Cara Menjalankan
            ```bash
            java -jar FoodFrenzy-1.0.0-exec.jar
            ```
          files: |
            target/FoodFrenzy-*.jar
          draft: false
          prerelease: false